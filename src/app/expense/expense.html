@if (!editing) {
  <mat-card class="expense-card" aria-label="Expense {{title}}">
    <mat-card-content>
      <div>
        <h3>{{title}}</h3>
        <p><strong>Price:</strong> {{price}}</p>
        <p><strong>Category:</strong> {{category}}</p>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-stroked-button color="primary" (click)="startEdit()" aria-label="Edit expense {{title}}">
        Edit
      </button>
    </mat-card-actions>
  </mat-card>
} @else {
  <mat-card class="expense-card" aria-label="Editing expense {{title}}">
    <mat-card-content>
      <mat-form-field appearance="fill" class="field">
        <mat-label>Title</mat-label>
        <input matInput type="text" [value]="editTitle" (input)="setEditTitle($event)" aria-label="Edit title" />
      </mat-form-field>
      <mat-form-field appearance="fill" class="field">
        <mat-label>Price</mat-label>
        <input matInput type="number" [value]="editPrice" (input)="setEditPrice($event)" aria-label="Edit price" />
      </mat-form-field>
      <mat-form-field appearance="fill" class="field">
        <mat-label>Category</mat-label>
        <input matInput type="text" [value]="editCategory" (input)="setEditCategory($event)" aria-label="Edit category" />
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-stroked-button (click)="cancelEdit()" aria-label="Cancel editing expense {{title}}">
        Cancel
      </button>
      <button mat-flat-button color="primary" (click)="saveEdit()" aria-label="Save changes to expense {{title}}">
        Save
      </button>
    </mat-card-actions>
  </mat-card>
}
