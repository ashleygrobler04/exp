<mat-form-field appearance="fill" class="field">
  <mat-label>Select a category</mat-label>
  <mat-select [value]="category" (selectionChange)="selectedCategoryOutput.emit($event.value)" aria-label="Category selector">
    @for (cc of categories; track cc) {
      <mat-option [value]="cc">{{cc}}</mat-option>
    }
  </mat-select>
</mat-form-field>
